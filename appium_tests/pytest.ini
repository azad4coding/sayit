[pytest]
# ── Markers ──────────────────────────────────────────────────────────────────
markers =
    smoke:      Quick sanity checks — run on every build
    regression: Full flow coverage — run before releases
    api:        Direct HTTP tests against the SayIt API routes
    ios:        iOS-specific tests
    android:    Android-specific tests

# ── Default options ───────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --html=reports/report.html
    --self-contained-html

# ── Test discovery ────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Logging ───────────────────────────────────────────────────────────────────
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %H:%M:%S
